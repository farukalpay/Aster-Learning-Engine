name: ci

on:
  push:
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      CMAKE_BUILD_CONFIG: Release

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libwayland-bin pkg-config wayland-protocols libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev xorg-dev

      - name: Clean generated build tree
        run: cmake -E rm -rf build

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_CONFIG }}

      - name: Build
        run: cmake --build build --config ${{ env.CMAKE_BUILD_CONFIG }} --parallel

      - name: Test
        run: ctest --test-dir build -C ${{ env.CMAKE_BUILD_CONFIG }} --output-on-failure

      - name: Rust tests
        run: cargo test --workspace
